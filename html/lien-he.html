<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ - HoaNK Store</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo"><a href="../index.html">HoaNK</a></div>
            
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Bạn tìm gì hôm nay?..." onkeyup="handleSearch(event)">
                <button type="button" onclick="triggerSearch()" class="search-btn-svg">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
            
            <div class="header-menu">
                <nav>
                    <ul>
                        <li><a href="san-pham.html">Sản phẩm</a></li>
                        <li><a href="gioi-thieu.html">Giới thiệu</a></li>
                        <li><a href="lien-he.html" class="active">Liên hệ</a></li>
                        <li><a href="#tai-khoan">Tài khoản</a></li>
                    </ul>
                </nav>
                <a href="gio-hang.html" class="cart-btn">Giỏ hàng (<span id="cart-count">0</span>)</a>
            </div>
        </div>
    </header>

    <div class="contact-page-container">
        <main class="contact-wrapper single-form">
            
            <div class="contact-form-block">
                <h2>Gửi Lời Nhắn Cho Chúng Tôi</h2>
                <p class="contact-subtitle">Nếu bạn có bất kỳ thắc mắc, đóng góp ý kiến hoặc gặp sự cố khi mua sắm, hãy điền thông tin bên dưới. Chúng tôi sẽ phản hồi sớm nhất!</p>
                
                <form id="feedback-form" onsubmit="handleContactSubmit(event)">
                    <div class="form-group">
                        <label for="contact-name">Họ và tên của bạn <span class="required">*</span></label>
                        <input type="text" id="contact-name" placeholder="Ví dụ: Nguyễn Văn A" required>
                    </div>

                    <div class="form-group">
                        <label for="contact-email">Địa chỉ Email <span class="required">*</span></label>
                        <input type="email" id="contact-email" placeholder="name@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="contact-phone">Số điện thoại liên hệ <span class="required">*</span></label>
                        <input type="tel" id="contact-phone" placeholder="Số điện thoại của bạn..." required>
                    </div>

                    <div class="form-group">
                        <label for="contact-message">Nội dung cần hỗ trợ <span class="required">*</span></label>
                        <textarea id="contact-message" rows="5" placeholder="Nhập lời nhắn hoặc câu hỏi của bạn tại đây..." required></textarea>
                    </div>

                    <button type="submit" class="btn-submit-contact">GỬI YÊU CẦU HỖ TRỢ</button>
                </form>
            </div>

        </main>
    </div>

    <footer>
        <p>110124066, DA24TTC, Thiết kế web</p>
        <p>GVHD: Nguyễn Ngọc Đan Thanh</p>
    </footer>

    <script src="../js/script.js"></script>
    <script>
        window.onload = function() {
            // Tự động đồng bộ cập nhật số lượng giỏ hàng lên Header
            updateCartCount();
        }

        // Xử lý sự kiện khi bấm nút gửi Form
        function handleContactSubmit(event) {
            event.preventDefault(); // Chặn tải lại trang
            
            const name = document.getElementById('contact-name').value;
            
            // Nếu bạn đã cài đặt hàm showToast thông báo tự ẩn, hệ thống sẽ gọi chạy rất mượt
            if (typeof showToast === "function") {
                showToast(`Cảm ơn ${name}! Yêu cầu hỗ trợ đã được gửi thành công.`);
            } else {
                alert(`Cảm ơn ${name}! Yêu cầu hỗ trợ của bạn đã được gửi đi.`);
            }

            // Làm sạch các ô nhập liệu sau khi gửi thành công
            document.getElementById('feedback-form').reset();
        }
    </script>
</body>
</html>
