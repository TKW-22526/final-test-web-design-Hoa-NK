<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - HoaNK Store</title>
    <link rel="stylesheet" href="../css/tai-khoan.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo"><a href="../index.html">HoaNK</a></div>
            
            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Bạn tìm gì hôm nay?..." onkeyup="handleSearch(event)">
                <button type="button" onclick="triggerSearch()" class="search-btn-svg">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
            
            <div class="header-menu">
                <nav>
                    <ul>
                        <li><a href="san-pham.html" class="active">Sản phẩm</a></li>
                        <li><a href="gioi-thieu.html">Giới thiệu</a></li>
                        <li><a href="lien-he.html">Liên hệ</a></li>
                        <li><a href="tai-khoan.html">Tài khoản</a></li>
                    </ul>
                </nav>
                <a href="gio-hang.html" class="cart-btn">Giỏ hàng (<span id="cart-count">0</span>)</a>
            </div>
        </div>
    </header>

    <main class="taikh-main">
        <div class="taikh-login-card">
            <h2>Đăng Nhập</h2>
            
            <div class="taikh-form-group">
                <label>Tên đăng nhập hoặc Email</label>
                <input type="text" placeholder="Nhập email tài khoản...">
            </div>
            <div class="taikh-form-group">
                <label>Mật khẩu</label>
                <input type="password" placeholder="••••••••">
            </div>
            <button class="taikh-btn-login-dummy">Đăng nhập</button>

            <div class="taikh-coming-soon-overlay">
                <div class="taikh-coming-soon-badge">Tính năng mới</div>
                <h3>Coming Soon</h3>
                <p>Hệ thống đăng nhập thành viên đang trong quá trình hoàn thiện cấu trúc.</p>
                <a href="../index.html" class="taikh-btn-back-home">Quay lại trang chủ</a>
            </div>
        </div>
    </main>

    <footer class="taikh-footer">
        <p>110124066, DA24TTC, Thiết kế web</p>
        <p>GVHD: Nguyễn Ngọc Đan Thanh</p>
    </footer>

</body>
</html>
